<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writeups Admin</title>
</head>
<body>
<div class="container">
  <h2>Writeups Admin</h2>
  <p>Total: {{ total }} &mdash; Quarantined: {{ quarantined }}</p>
  <button id="wu-sync" class="btn btn-primary">Sync now</button>
  <pre id="wu-sync-out"></pre>
  <script>
    document.getElementById("wu-sync").onclick = async () => {
      var csrfNonce = (typeof init !== "undefined" && init.csrfNonce)
                      ? init.csrfNonce
                      : document.querySelector('meta[name="csrf-token"]')
                        ? document.querySelector('meta[name="csrf-token"]').content
                        : "";
      var r = await fetch("/admin/writeups/sync", {
        method: "POST",
        headers: {"Content-Type": "application/json", "CSRF-Token": csrfNonce}
      });
      document.getElementById("wu-sync-out").textContent = await r.text();
    };
  </script>
</div>
</body>
</html>
